name: Deploy vResolve to EC2

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Deploy to EC2
    runs-on: ubuntu-latest

    steps:
      # ── Checkout ─────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── SSH Key ──────────────────────────────────────────
      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.EC2_SSH_KEY }}" > ~/.ssh/ec2_key.pem
          chmod 600 ~/.ssh/ec2_key.pem
          ssh-keyscan -H ${{ secrets.EC2_HOST }} >> ~/.ssh/known_hosts

      # ── Copy backend files ───────────────────────────────
      - name: Copy backend
        run: |
          scp -i ~/.ssh/ec2_key.pem \
            backend/server.js \
            backend/package.json \
            ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}:/var/www/vresolve/backend/

      # ── Copy all frontend files ──────────────────────────
      - name: Copy frontend
        run: |
          scp -i ~/.ssh/ec2_key.pem \
            frontend/index.html \
            frontend/styles.css \
            frontend/app.js \
            ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}:/var/www/vresolve/public/

      # ── Write .env from GitHub Secrets ───────────────────
      - name: Write .env
        run: |
          ssh -i ~/.ssh/ec2_key.pem \
            ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} \
            "cat > /var/www/vresolve/backend/.env << 'EOF'
          PORT=5000
          DB_HOST=${{ secrets.DB_HOST }}
          DB_PORT=5432
          DB_NAME=vresolve
          DB_USER=postgres
          DB_PASSWORD=${{ secrets.DB_PASSWORD }}
          DB_SSL=false
          JWT_SECRET=${{ secrets.JWT_SECRET }}
          GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}
          CORS_ORIGIN=${{ secrets.CORS_ORIGIN }}
          EOF"

      # ── Fix permissions ───────────────────────────────────
      - name: Fix permissions
        run: |
          ssh -i ~/.ssh/ec2_key.pem \
            ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} \
            "sudo chown -R ubuntu:ubuntu /var/www/vresolve/ && \
             sudo chown -R www-data:www-data /var/www/vresolve/public/ && \
             sudo chmod -R 755 /var/www/vresolve/"

      # ── Install deps & restart API ────────────────────────
      - name: Install & Restart
        run: |
          ssh -i ~/.ssh/ec2_key.pem \
            ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} \
            "cd /var/www/vresolve/backend && \
             npm install --production && \
             pm2 restart vresolve-api || pm2 start server.js --name vresolve-api && \
             pm2 save"

      # ── Reload Nginx ──────────────────────────────────────
      - name: Reload Nginx
        run: |
          ssh -i ~/.ssh/ec2_key.pem \
            ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} \
            "sudo systemctl reload nginx"

      # ── Health check ──────────────────────────────────────
      - name: Health check
        run: |
          sleep 5
          curl -f http://${{ secrets.EC2_HOST }}/api/health || exit 1
          echo "✅ Deployment complete — vResolve is live!"
